plugins {
    id "com.android.application"
    id "com.facebook.react"
    id "com.google.gms.google-services"
    id "com.google.firebase.crashlytics"
}

import com.android.build.OutputFile

react {
    autolinkLibrariesWithApp()
}

def enableSeparateBuildPerCPUArchitecture = false
def enableProguardInReleaseBuilds = false
def jscFlavor = 'org.webkit:android-jsc:+'

def reactNativeArchitectures() {
    def value = project.getProperties().get("reactNativeArchitectures")
    return value ? value.split(",") : ["armeabi-v7a", "x86", "x86_64", "arm64-v8a"]
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

android {
    ndkVersion rootProject.ext.ndkVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.whoami.today.app"

    sourceSets {
        main {
            java {
                // Exclude deprecated widget code (Manifest entries are commented out; layouts removed)
                exclude '**/widget/*_DEPRECATED.java'
            }
        }
    }

    defaultConfig {
        applicationId "com.whoami.today.app"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 10431
        versionName "1.9"
        ndk {
            // Ship arm64-only native binaries for Play 16KB page-size compatibility.
            abiFilters "arm64-v8a"
        }
        // .env from repo root (react-native-config) so Config.SPOTIFY_* is available on Android
        def envFile = rootProject.file("../.env")
        println("WhoAmI .env: path=" + envFile.getAbsolutePath() + " exists=" + envFile.exists())
        if (envFile.exists()) {
            envFile.eachLine { line ->
                def matcher = (line =~ /^\s*(?:export\s+|)([\w\d\.\-_]+)\s*=\s*['"]?(.*?)?['"]?\s*$/)
                if (matcher.getCount() == 1 && matcher[0].size() == 3) {
                    def key = matcher[0][1]
                    def value = matcher[0][2].replace('"', '\\"').replaceAll("%", "\\\\u0025")
                    buildConfigField "String", key, "\"$value\""
                    resValue "string", key, "\"$value\""
                }
            }
        }
    }

    splits {
        abi {
            reset()
            enable enableSeparateBuildPerCPUArchitecture
            universalApk false
            include (*reactNativeArchitectures())
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            storeFile file(localProperties['MYAPP_RELEASE_STORE_FILE'])
            storePassword localProperties['MYAPP_RELEASE_STORE_PASSWORD']
            keyAlias localProperties['MYAPP_RELEASE_KEY_ALIAS']
            keyPassword localProperties['MYAPP_RELEASE_KEY_PASSWORD']
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    packagingOptions {
        jniLibs {
            // AGP 8.5.1+ path: keep modern packaging to request proper 16KB page alignment in Play-generated APKs.
            useLegacyPackaging false
        }
    }

    applicationVariants.all { variant ->
        variant.outputs.each { output ->
            def versionCodes = ["armeabi-v7a": 1, "x86": 2, "arm64-v8a": 3, "x86_64": 4]
            def abi = output.getFilter(OutputFile.ABI)
            if (abi != null) {
                output.versionCodeOverride = defaultConfig.versionCode * 1000 + versionCodes.get(abi)
            }
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("androidx.swiperefreshlayout:swiperefreshlayout:1.0.0")

    debugImplementation("com.facebook.flipper:flipper:${FLIPPER_VERSION}")
    debugImplementation("com.facebook.flipper:flipper-network-plugin:${FLIPPER_VERSION}") {
        exclude group:'com.squareup.okhttp3', module:'okhttp'
    }
    debugImplementation("com.facebook.flipper:flipper-fresco-plugin:${FLIPPER_VERSION}")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    implementation platform('com.google.firebase:firebase-bom:33.5.1')
    implementation 'com.google.firebase:firebase-messaging'
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'org.jetbrains:annotations:16.0.2'

    // ❗ '+'는 재현성 깨짐. 가능하면 고정 권장
    implementation("androidx.activity:activity:1.9.3")
}
